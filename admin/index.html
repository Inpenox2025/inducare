<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal Login — Ozonature</title>
    <meta name="description" content="Staff portal login for Ozonature.">
    <link rel="stylesheet" href="/admin/login.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
</head>

<body>

    <div class="login-bg">
        <div class="login-container">
            <div class="login-card" id="loginCard">
                <div class="login-logo">
                    <img src="/assets/ozonature logo.jpg" alt="Ozonature Logo" style="height: 60px; object-fit: contain; display: block; margin: 0 auto;">
                </div>
                <h1>Staff Portal</h1>
                <p class="login-desc">Ozonature — The Holistic Care</p>

                <form id="loginForm" autocomplete="off">
                    <div class="form-group">
                        <label for="username">Username or Mobile Number</label>
                        <div class="input-icon">
                            <span class="icon">👤</span>
                            <input type="text" class="form-control" id="username" placeholder="Enter username or mobile" required
                                autofocus>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-icon" style="position: relative;">
                            <span class="icon">🔒</span>
                            <input type="password" class="form-control" id="password" placeholder="Enter password"
                                required style="padding-right: 40px;">
                            <button type="button" id="passwordToggle" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 16px; color: #607377; padding: 4px; display: flex; align-items: center; justify-content: center; z-index: 10;">👁️</button>
                        </div>
                    </div>
                    <div class="error-msg" id="errorMsg"></div>
                    <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
                </form>

                <!-- <div style="margin-top: 20px; text-align: center;">
                    <a href="#" id="setupDbLink" class="setup-link">⚙️ Initialize Database</a>
                </div> -->

                <a href="../" class="back-link">← Back to Website</a>
            </div>
            <div style="text-align: center; margin-top: 20px; font-size: 12px; color: #8e9ea2;">
                Developed & Maintained by <a href="https://inpenox.in" target="_blank"
                    style="color: #00bba8; text-decoration: none; font-weight: 600;">Inpenox</a>
            </div>
        </div>
    </div>

    <script src="/admin/login.js"></script>
</body>

</html>
